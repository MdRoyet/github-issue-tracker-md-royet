<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans">

    <section id="login-page" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-auto max-w-md text-center">
            <img src="./assets/github-logo.png" class="mx-auto w-16 mb-4">
            <h1 class="text-2xl font-bold text-gray-800">Welcome Back</h1>
            <p class="text-gray-500 mb-6">Enter your credentials to access the tracker</p>
            
            <form id="login-form" class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded-md outline-blue-500" required>
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-md outline-blue-500" required>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-md font-semibold hover:bg-blue-700 transition">Sign In</button>
            </form>

            <div class="mt-6 p-4 bg-blue-50 rounded text-sm text-blue-700">
                <p id="error-message" class="text-red-500 text-xs mt-2 hidden"></p>
                <p>User: admin | Pass: admin123</p>
            </div>
        </div>
    </section>

    <section id="main-page" class="hidden">
        <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
            <div class="font-bold text-xl text-blue-600">IssueTracker</div>
            <div class="flex gap-2">
                <input type="text" id="search-input" placeholder="Search issues..." class="border p-2 rounded-l-md w-64 outline-none">
                <button onclick="handleSearch()" class="bg-blue-600 text-white px-4 py-2 rounded-r-md">Search</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6">
            <div class="flex border-b mb-6">
                <button onclick="filterIssues('all')" class="tab-btn active px-6 py-2 font-medium border-b-2 border-blue-600 text-blue-600">All</button>
                <button onclick="filterIssues('open')" class="tab-btn px-6 py-2 font-medium text-gray-500 hover:text-blue-600">Open</button>
                <button onclick="filterIssues('closed')" class="tab-btn px-6 py-2 font-medium text-gray-500 hover:text-blue-600">Closed</button>
            </div>

            <div id="loading-spinner" class="hidden text-center py-10">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
            </div>
            
            <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </main>
    </section>

    <div id="issue-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-2xl w-full p-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

</body>
</html>
