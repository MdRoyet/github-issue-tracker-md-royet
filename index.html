<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Tailwind Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        //  Tailwind Configuration
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A00FF',
                        open: '#00A96E',
                        closed: '#A855F7',
                        bgSoft: '#F8F9FB'
                    },
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
body{
  font-family: "Geist", sans-serif;
}
</style>

    <style>
        /* Custom Loader Animation */
        .loader {
            border-top-color: #4A00FF;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-bgSoft text-slate-800 font-sans min-h-screen">

    <div id="login-page" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-10 rounded-xl shadow-xl max-w-md w-full text-center border border-slate-100">
            <div class="mb-6">
                <i class="fab fa-github text-5xl text-slate-800"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">GitHub Issues Tracker</h2>
            <p class="text-slate-500 mb-8">Sign in to manage your issues</p>
            
            <form id="login-form" class="space-y-5 text-left">
                <div>
                    <label class="block text-sm font-semibold mb-1">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" required 
                           class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                    <small class="text-slate-400">Default: admin</small>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required 
                           class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                    <small class="text-slate-400">Default: admin123</small>
                </div>
                <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:opacity-90 transition shadow-lg shadow-primary/20">
                    Sign In
                </button>
            </form>
            
            <div class="mt-8">
                <div class="flex items-center my-4 before:flex-1 before:border-t before:border-slate-200 after:flex-1 after:border-t after:border-slate-200">
                    <span class="mx-4 text-slate-400 text-sm">OR</span>
                </div>
                <div class="bg-slate-50 p-4 rounded-lg text-sm border border-slate-100">
                    <p class="font-medium text-slate-600">Demo Credentials:</p>
                    <p class="text-slate-500"><strong>User:</strong> admin | <strong>Pass:</strong> admin123</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 px-[6%] py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 text-xl font-extrabold tracking-tight">
                <i class="fab fa-github text-2xl"></i>
                <span>GitHub Issues</span>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="relative flex-grow md:w-72">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="search-input" placeholder="Search issues..." 
                           class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none">
                </div>
                <button class="bg-primary text-white px-5 py-2 rounded-lg font-semibold text-sm hover:opacity-90 whitespace-nowrap">
                    + New Issue
                </button>
            </div>
        </nav>

        <main class="px-[6%] py-10">
            <div class="flex bg-white border border-slate-200 p-1 rounded-xl w-fit mb-8 shadow-sm">
                <button class="tab-btn px-6 py-2 rounded-lg font-semibold text-slate-500 transition active bg-primary text-white" data-filter="all">All</button>
                <button class="tab-btn px-6 py-2 rounded-lg font-semibold text-slate-500 transition" data-filter="open">Open</button>
                <button class="tab-btn px-6 py-2 rounded-lg font-semibold text-slate-500 transition" data-filter="closed">Closed</button>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-6 mb-10 flex flex-col sm:flex-row justify-between items-center gap-6 shadow-sm">
                <div class="flex items-center gap-5">
                    <div class="w-12 h-12 bg-indigo-50 rounded-full overflow-hidden flex items-center justify-center p-1">
                        <img src="./assets/Aperture.png" alt="Aperture" class="w-full h-full object-cover rounded-full">
                    </div>
                    <div>
                        <h3 id="issue-count" class="text-2xl font-bold leading-none">0 Issues</h3>
                        <p class="text-slate-500 text-sm mt-1">Real-time project tracking</p>
                    </div>
                </div>
                <div class="flex gap-6 font-semibold text-sm">
                    <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-open"></span> Open</span>
                    <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-closed"></span> Closed</span>
                </div>
            </div>

            <div id="loader" class="hidden">
                <div class="loader w-10 h-10 border-4 border-slate-200 rounded-full mx-auto my-12"></div>
            </div>

            <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </main>
    </div>

    <div id="issue-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div id="modal-body" class="p-8">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
